version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: fake_news_detector_mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build:
      context: ./backend
    container_name: fake_news_detector_api
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/}
      MONGO_DB: ${MONGO_DB:-fake_news_detector}
      AUTO_SEED: ${AUTO_SEED:-true}
      PORT: ${BACKEND_PORT:-5000}
    ports:
      - "${BACKEND_PORT:-5000}:5000"

volumes:
  mongo_data:
